name: workflows-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workflows-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out workflows
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workflows dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run workflows tests
        run: python -m pytest -q

  workflow-core-smoke:
    runs-on: ubuntu-latest
    needs: workflows-test
    timeout-minutes: 20

    steps:
      - name: Check out workflows
        uses: actions/checkout@v4

      - name: Check out pinned core
        uses: actions/checkout@v4
        with:
          repository: DarksiedCEO/phantom-strike-core
          ref: de475590838f7931bcd1fbabafdac04f6ad17736
          path: phantom-strike-core

      - name: Check out pinned contracts
        uses: actions/checkout@v4
        with:
          repository: DarksiedCEO/phantom-strike-contracts
          ref: 6e129c9cd411e32a76a49a3b138c8e4c202ddbab
          path: phantom-strike-contracts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workflows dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Temporal CLI
        shell: bash
        run: |
          curl -sSfL https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> "$GITHUB_PATH"

      - name: Start Temporal dev server
        run: temporal server start-dev > temporal.log 2>&1 &

      - name: Wait for Temporal readiness
        shell: bash
        run: |
          for attempt in {1..60}; do
            if python3 -c "import socket; sock = socket.socket(); sock.settimeout(1); sock.connect(('127.0.0.1', 7233)); sock.close()"
            then
              exit 0
            fi
            sleep 1
          done

          echo "SMOKE FAIL: Temporal never bound to 127.0.0.1:7233"
          exit 1

      - name: Start pinned core
        working-directory: ./phantom-strike-core
        env:
          PORT: "3100"
          CONTRACTS_SCHEMA_DIR: ${{ github.workspace }}/phantom-strike-contracts/schemas/v1
        run: cargo run > ../core.log 2>&1 &

      - name: Wait for core readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if python3 -c "import socket; sock = socket.socket(); sock.settimeout(1); sock.connect(('127.0.0.1', 3100)); sock.close()"
            then
              exit 0
            fi
            sleep 1
          done

          echo "SMOKE FAIL: core never bound to 127.0.0.1:3100"
          exit 1

      - name: Create workflows env file
        run: cp .env.example .env

      - name: Start workflows worker
        run: python run_worker.py > worker.log 2>&1 &

      - name: Wait for worker startup
        shell: bash
        run: |
          for attempt in {1..30}; do
            if grep -q "worker_startup" worker.log; then
              exit 0
            fi

            if ! pgrep -f "python run_worker.py" > /dev/null; then
              echo "SMOKE FAIL: workflows worker exited before startup completed"
              exit 1
            fi

            sleep 1
          done

          echo "SMOKE FAIL: workflows worker never reported startup"
          exit 1

      - name: Run workflows-to-core smoke
        run: python -m scripts.smoke_workflow_core_handoff

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-core-smoke-logs
          path: |
            temporal.log
            core.log
            worker.log
          if-no-files-found: ignore
